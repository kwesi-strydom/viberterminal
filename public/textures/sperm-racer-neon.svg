<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="256" viewBox="0 0 512 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with bright neon glow -->
  <rect x="5" y="5" width="502" height="246" rx="20" fill="#000000" stroke="#ff00ff" stroke-width="8" />
  
  <!-- Bright neon frame -->
  <rect x="20" y="20" width="472" height="216" rx="15" fill="none" stroke="#00ffff" stroke-width="6" />
  
  <!-- Title with extreme neon effect -->
  <g filter="url(#extreme-neon)">
    <text x="256" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">SPERM RACER</text>
  </g>
  
  <!-- Highly stylized sperm icon -->
  <g transform="translate(256, 150) scale(1.2)" filter="url(#glow)">
    <circle cx="0" cy="0" r="25" fill="#ffffff" />
    <path d="M 20,-5 C 40,-20 60,-10 80,0 C 100,10 110,30 100,50 C 90,70 60,60 40,50 C 20,40 10,20 20,-5 Z" fill="#ffffff" />
  </g>
  
  <!-- "CLICK TO PLAY" text -->
  <g filter="url(#extreme-neon2)">
    <text x="256" y="210" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffff00" text-anchor="middle">TAP TO RACE!</text>
  </g>
  
  <!-- Neon glow filter effects -->
  <defs>
    <filter id="extreme-neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feFlood flood-color="#ff00ff" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="glow" />
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="extreme-neon2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feFlood flood-color="#ffff00" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feFlood flood-color="#ffffff" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>